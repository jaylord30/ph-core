name: Build, Test, and Deploy PH Core FHIR IG

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ig-main
  cancel-in-progress: true

jobs:
  ci:
    name: CI - Build & QA (Core IG)
    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: "17"
      NODE_VERSION: "18"
      RUBY_VERSION: "3.1"

    
      IG_PUBLISHER_VERSION: "latest"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Install Jekyll
        run: gem install jekyll bundler

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - name: Cache publisher + packages
        uses: actions/cache@v4
        with:
          path: |
            input-cache
            ~/.fhir/packages
          key: ${{ runner.os }}-fhir-core-${{ env.IG_PUBLISHER_VERSION }}-${{ hashFiles('**/sushi-config.yaml', '**/ig.ini', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-fhir-core-${{ env.IG_PUBLISHER_VERSION }}-
            ${{ runner.os }}-fhir-core-

      - name: Download IG Publisher
        run: |
          set -euo pipefail
          mkdir -p input-cache
          curl -fsSL \
            "https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar" \
            -o "input-cache/publisher.jar"
          java -jar input-cache/publisher.jar -v || true

      - name: Run SUSHI
        run: |
          set -euo pipefail
          sushi . --log-level debug

      - name: Build IG
        run: |
          set -euo pipefail
          java -jar input-cache/publisher.jar publisher -ig .
          test -d output || (echo "IG Publisher did not create output/" && exit 1)

      - name: Fail if output is empty
        run: |
          set -euo pipefail
          if [ -z "$(ls -A output 2>/dev/null)" ]; then
            echo "IG Publisher did not generate output files."
            exit 1
          fi

      - name: QA gate (prefer qa.json, fallback to qa.html)
        run: |
          set -euo pipefail

          if [ -f output/qa.json ]; then
            ERRORS=$(node -e "const q=require('./output/qa.json'); console.log((q.errCount ?? q.errors ?? q.errorCount ?? 0))" || echo "0")
            if [ "$ERRORS" != "0" ]; then
              echo "QA errors found in qa.json (count=$ERRORS)"
              exit 1
            fi
            echo "QA passed via qa.json (errors=$ERRORS)"
          elif [ -f output/qa.html ]; then
            if grep -qE "(Errors:\\s*[1-9]|ERROR)" output/qa.html; then
              echo "QA errors found in qa.html"
              exit 1
            fi
            echo "QA passed via qa.html"
          else
            echo "No qa.json or qa.html found in output/. Failing for safety."
            exit 1
          fi

      - name: Upload IG artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-ig-output
          path: output

      - name: Prepare publish directory
        run: |
          set -euo pipefail
          rm -rf .publish
          mkdir -p .publish/dev
          rsync -a output/ .publish/dev/  
                  
      - name: Create root index.html
        run: |
          cat > .publish/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>PH Core FHIR IG</title>
          </head>
          <body>
            <h1>PH Core FHIR IG</h1>
            <p><a href="./dev/">Open latest dev build</a></p>
          </body>
          </html>
          EOF

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .publish
          keep_files: true
          commit_message: "ci: publish PH Core IG from ${{ github.sha }}"

