name: IG Release Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ig-release
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish Release IG
    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: "17"
      NODE_VERSION: "18"
      RUBY_VERSION: "3.1"
      IG_PUBLISHER_VERSION: "latest"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Derive version from tag
        id: v
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Install Jekyll
        run: gem install jekyll bundler

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - name: Install Graphviz (for PlantUML dot renderer)
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          which dot
          dot -v

      - name: Cache publisher + packages
        uses: actions/cache@v4
        with:
          path: |
            input-cache
            ~/.fhir/packages
          key: ${{ runner.os }}-fhir-release-${{ env.IG_PUBLISHER_VERSION }}-${{ hashFiles('**/sushi-config.yaml', '**/ig.ini', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-fhir-release-${{ env.IG_PUBLISHER_VERSION }}-
            ${{ runner.os }}-fhir-release-

      - name: Download IG Publisher
        run: |
          set -euo pipefail
          mkdir -p input-cache
          curl -fsSL \
            "https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar" \
            -o "input-cache/publisher.jar"
          java -jar input-cache/publisher.jar -v || true

      - name: Patch version for release build (sushi-config.yaml)
        env:
          RELEASE_VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, re, pathlib
          version = os.environ["RELEASE_VERSION"]
          p = pathlib.Path("sushi-config.yaml")
          txt = p.read_text(encoding="utf-8")

          txt = re.sub(r'(?m)^(version:\s*).+$', r'\g<1>' + version, txt)

          if re.search(r'(?m)^releaseLabel:\s*.+$', txt):
              txt = re.sub(r'(?m)^(releaseLabel:\s*).+$', r'\g<1>release', txt)
          else:
              txt += "\nreleaseLabel: release\n"

          p.write_text(txt, encoding="utf-8")
          print(f"Patched sushi-config.yaml -> version={version}, releaseLabel=release")
          PY

      - name: Run SUSHI
        run: |
          set -euo pipefail
          sushi . --log-level debug

      - name: Build IG
        run: |
          set -euo pipefail
          java -jar input-cache/publisher.jar publisher -ig .
          test -d output || (echo "IG Publisher did not create output/" && exit 1)

      - name: Fail if output is empty
        run: |
          set -euo pipefail
          if [ -z "$(ls -A output 2>/dev/null)" ]; then
            echo "IG Publisher did not generate output files."
            exit 1
          fi

      - name: QA gate (prefer qa.json, fallback to qa.html)
        run: |
          set -euo pipefail

          if [ -f output/qa.json ]; then
            ERRORS=$(node -e "const q=require('./output/qa.json'); console.log((q.errCount ?? q.errors ?? q.errorCount ?? 0))" || echo "0")
            if [ "$ERRORS" != "0" ]; then
              echo "QA errors found in qa.json (count=$ERRORS)"
              exit 1
            fi
            echo "QA passed via qa.json (errors=$ERRORS)"
          elif [ -f output/qa.html ]; then
            if grep -qE "(Errors:\s*[1-9]|ERROR)" output/qa.html; then
              echo "QA errors found in qa.html"
              exit 1
            fi
            echo "QA passed via qa.html"
          else
            echo "No qa.json or qa.html found in output/. Failing for safety."
            exit 1
          fi

      - name: Upload IG artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ig-output-${{ steps.v.outputs.version }}
          path: output

      - name: Prepare publish directory (release)
        env:
          RELEASE_VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail

          REL="${RELEASE_VERSION}"

          rm -rf .publish
          mkdir -p ".publish/$REL"
          mkdir -p ".publish/current"

          rsync -a output/ ".publish/$REL/"

          cat > ".publish/current/index.html" <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=../$REL/">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Redirecting to latest release</title>
          </head>
          <body>
            <p>Redirecting to <a href="../$REL/">$REL</a>...</p>
          </body>
          </html>
          EOF

      - name: Generate history.html
        env:
          RELEASE_VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, re, pathlib

          root = pathlib.Path(".publish")
          rel = os.environ["RELEASE_VERSION"]

          versions = []
          for p in root.iterdir():
              if p.is_dir() and re.fullmatch(r"\d+\.\d+\.\d+([\-\.].+)?", p.name):
                  versions.append(p.name)

          if rel not in versions:
              versions.append(rel)

          versions.sort(
              key=lambda s: [int(x) if x.isdigit() else x for x in re.split(r'(\d+)', s)],
              reverse=True
          )

          html = [
              "<!doctype html>",
              "<html lang='en'>",
              "<head>",
              "  <meta charset='utf-8'>",
              "  <meta name='viewport' content='width=device-width, initial-scale=1'>",
              "  <title>PH Core FHIR IG - Publication History</title>",
              "</head>",
              "<body>",
              "  <h1>Publication History</h1>",
              "  <p>All published versions of the PH Core FHIR Implementation Guide.</p>",
              "  <ul>",
          ]

          for v in versions:
              html.append(f"    <li><a href='./{v}/'>{v}</a></li>")

          html += [
              "  </ul>",
              "  <hr>",
              "  <p><a href='./dev/'>Development build (latest CI)</a></p>",
              "</body>",
              "</html>",
          ]

          (root / "history.html").write_text("\n".join(html), encoding="utf-8")
          print(f"Wrote history.html with {len(versions)} release(s)")
          PY

      - name: Generate package-list.json
        env:
          RELEASE_VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, json, pathlib, datetime

          root = pathlib.Path(".publish")
          pl_path = root / "package-list.json"
          version = os.environ["RELEASE_VERSION"]

          canonical = "https://jaylord30.github.io/ph-core"

          if pl_path.exists():
              pl = json.loads(pl_path.read_text(encoding="utf-8"))
          else:
              pl = {
                  "package-id": "ph.core.fhir.ig",
                  "title": "PH Core FHIR Implementation Guide",
                  "canonical": canonical,
                  "introduction": "PH Core FHIR Implementation Guide",
                  "list": []
              }

          for entry in pl.get("list", []):
              entry["current"] = False

          existing_versions = {entry.get("version") for entry in pl.get("list", [])}
          if version not in existing_versions:
              pl["list"].insert(0, {
                  "version": version,
                  "date": datetime.date.today().isoformat(),
                  "path": f"{canonical}/{version}",
                  "status": "release",
                  "sequence": "Release",
                  "fhirversion": "4.0.1",
                  "current": True
              })
          else:
              for entry in pl["list"]:
                  if entry.get("version") == version:
                      entry["current"] = True

          pl_path.write_text(json.dumps(pl, indent=2) + "\n", encoding="utf-8")
          print(f"Updated package-list.json with release {version}")
          PY

      - name: Generate root index.html
        env:
          RELEASE_VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, pathlib

          root = pathlib.Path(".publish")
          pl_path = root / "package-list.json"

          releases = []
          if pl_path.exists():
              pl = json.loads(pl_path.read_text(encoding="utf-8"))
              for entry in pl.get("list", []):
                  releases.append({
                      "version": entry.get("version", ""),
                      "date": entry.get("date", ""),
                      "current": entry.get("current", False),
                      "status": entry.get("status", "release")
                  })

          rows = []
          rows.append(
              '<tr>'
              '<td><a href="./dev/">dev</a></td>'
              '<td>CI Build</td>'
              '<td>Latest continuous integration build from the <code>main</code> branch.</td>'
              '</tr>'
          )

          for r in releases:
              badge = " (current)" if r["current"] else ""
              date_text = f' - published {r["date"]}' if r["date"] else ""
              rows.append(
                  f'<tr>'
                  f'<td><a href="./{r["version"]}/">{r["version"]}</a></td>'
                  f'<td>Release{badge}</td>'
                  f'<td>Published release{date_text}.</td>'
                  f'</tr>'
              )

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>PH Core FHIR IG</title>
          </head>
          <body>
            <h1>PH Core FHIR IG</h1>
            <p>This is the publication landing page for the PH Core FHIR Implementation Guide.</p>

            <h2>Published Versions</h2>
            <table border="1" cellpadding="6" cellspacing="0">
              <thead>
                <tr>
                  <th>Version</th>
                  <th>Status</th>
                  <th>Description</th>
                </tr>
              </thead>
              <tbody>
                {''.join(rows)}
              </tbody>
            </table>

            <h2>Quick Links</h2>
            <ul>
              <li><a href="./current/">Latest release</a></li>
              <li><a href="./history.html">Publication history</a></li>
              <li><a href="./package-list.json">package-list.json</a></li>
            </ul>
          </body>
          </html>
          """

          root.joinpath("index.html").write_text(html, encoding="utf-8")
          print("Wrote root index.html")
          PY

      - name: Publish release to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .publish
          keep_files: true
          commit_message: "release: publish ${{ steps.v.outputs.tag }} (IG ${{ steps.v.outputs.version }})"